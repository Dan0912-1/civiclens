name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Principle of least privilege: default-deny everything, opt in per job
# if a job ever needs to write. None of these jobs do.
permissions:
  contents: read

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # --------------------------------------------------------------------------
  # Fast static checks. Catches Pass 2's exact failure mode (duplicate
  # top-level const in api/server.js) via node --check in ~1s.
  # --------------------------------------------------------------------------
  lint:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: node --check on api/**/*.js
        run: npm run check:backend

      - name: Cross-file duplicate-declaration scan
        run: npm run check:dupes

  # --------------------------------------------------------------------------
  # Frontend still compiles. vite build is what production uses.
  # --------------------------------------------------------------------------
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

  # --------------------------------------------------------------------------
  # Backend actually boots AND serves. The smoke script now waits for the
  # boot banner, then curls /api/health via Node's built-in fetch. That
  # exercises the Express router + middleware stack, catching middleware
  # binding or route-mount bugs that don't throw at module eval.
  # --------------------------------------------------------------------------
  backend-boot:
    name: Backend boot smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Boot smoke
        run: npm run smoke:backend
        env:
          SMOKE_PORT: '3099'
          # Routes that need these degrade gracefully; boot must not depend
          # on real values. Secrets are never injected into CI.
          CONGRESS_API_KEY: ''
          ANTHROPIC_API_KEY: ''
          GROQ_API_KEY: ''
          SUPABASE_URL: ''
          SUPABASE_SERVICE_KEY: ''
          RESEND_API_KEY: ''
          FCM_SERVICE_ACCOUNT: ''
          LEGISCAN_API_KEY: ''
          FRONTEND_URL: 'http://localhost:5173'
