name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # --------------------------------------------------------------------------
  # Fast static checks. Catches Pass 2's exact failure mode (duplicate
  # top-level const in api/server.js) via node --check in ~1s.
  # --------------------------------------------------------------------------
  lint:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: node --check on api/**/*.js
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! node --check "$f"; then
              echo "::error file=$f::node --check failed"
              fail=1
            fi
          done < <(find api -type f -name '*.js' -not -path 'api/node_modules/*')
          exit $fail

      - name: Cross-file duplicate-declaration scan
        run: node scripts/ci-duplicate-scan.mjs

  # --------------------------------------------------------------------------
  # Frontend still compiles. vite build is what production uses.
  # --------------------------------------------------------------------------
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

  # --------------------------------------------------------------------------
  # Backend actually boots. Catches runtime import failures, top-level
  # throws, and missing module specifiers that node --check cannot see.
  # Uses placeholder env only; routes that need real keys degrade.
  # --------------------------------------------------------------------------
  backend-boot:
    name: Backend boot smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Boot smoke
        run: node scripts/ci-boot-smoke.mjs
        env:
          SMOKE_PORT: '3099'
          # Routes that need these degrade gracefully; boot must not depend
          # on real values. Secrets are never injected into CI.
          CONGRESS_API_KEY: ''
          ANTHROPIC_API_KEY: ''
          GROQ_API_KEY: ''
          SUPABASE_URL: ''
          SUPABASE_SERVICE_KEY: ''
          RESEND_API_KEY: ''
          FCM_SERVICE_ACCOUNT: ''
          LEGISCAN_API_KEY: ''
          FRONTEND_URL: 'http://localhost:5173'
